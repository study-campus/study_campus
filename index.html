<!DOCTYPE html>
<html lang="ko">

    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">

    <link rel="stylesheet" href="./css/main.css">
    
    <script defer src="./js/app.js"></script>
    <script defer src="./js/pwa.js"></script>

<body>
    <div id="overlay" class="overlay" aria-hidden="true"></div>

    <header class="main-header">

            <nav class="gnb">

                    <li><a href="#high1">고1·2</a></li>
                    <li><a href="#high3">고3·N수</a></li>
                    <li><a href="#teachers">선생님</a></li>
                </ul>
            </nav>
            <div class="header-util">
                <a href="#" class="btn btn-outline">로그인</a>

                    <span></span><span></span><span></span>

            </div>
        </div>
    </header>

    <div id="mobileSidebar" class="mobile-sidebar">

            </div>
        </section>

        <section class="quick-links-grid container">
            <button class="quick-item" data-action="classroom">📖 내 강의실</button>
            <button class="quick-item" data-action="exams">📝 기출문제</button>
            <button class="quick-item" data-action="planner">🎯 학습플래너</button>
